name: Build Android ARM64
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK r25
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
      - name: Install CMake 4.0 and Ninja
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build
          wget -q https://github.com/Kitware/CMake/releases/download/v4.0.2/cmake-4.0.2-linux-x86_64.tar.gz
          tar xzf cmake-4.0.2-linux-x86_64.tar.gz
          echo "$PWD/cmake-4.0.2-linux-x86_64/bin" >> $GITHUB_PATH
      - name: Build ShadowHook
        run: |
          mkdir build && cd build
          cmake ../shadowhook/src/main/cpp \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-Wno-error -Wno-declaration-after-statement -Wno-unsafe-buffer-usage" \
            -G Ninja
          ninja -j$(nproc)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libshadowhook-arm64
          path: build/libshadowhook.so
